name: ACLClouds Auto Renew
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  renew-job:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Install proxychains
        run: sudo apt-get install -y proxychains4

      - name: Run Renew Script
        env:
          ACL_COOKIES: ${{ secrets.ACL_COOKIES }}
          PROXY_HOST: ${{ secrets.PROXY_HOST }}
          PROXY_PORT: ${{ secrets.PROXY_PORT }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
        run: |
          if [ -n "$PROXY_HOST" ] && [ -n "$PROXY_PORT" ]; then
            echo "strict_chain" > proxychains.conf
            echo "proxy_dns" >> proxychains.conf
            echo "[ProxyList]" >> proxychains.conf
            echo "socks5 $PROXY_HOST $PROXY_PORT $PROXY_USER $PROXY_PASS" >> proxychains.conf
            echo "使用代理: $PROXY_HOST:$PROXY_PORT"
            proxychains4 -f proxychains.conf python renew.py
          else
            echo "未配置代理，直连"
            python renew.py
          fi

      - name: Keep Repo Active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last run: $(date '+%Y-%m-%d %H:%M:%S')" > keep_alive.txt
          git add keep_alive.txt
          git diff --staged --quiet || git commit -m "chore: keep alive $(date '+%Y-%m-%d')"
          git push
