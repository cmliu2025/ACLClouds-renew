name: ACLClouds Auto Renew
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  renew-job:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Setup redsocks proxy
        env:
          PROXY_HOST: ${{ secrets.PROXY_HOST }}
          PROXY_PORT: ${{ secrets.PROXY_PORT }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
        run: |
          if [ -n "$PROXY_HOST" ] && [ -n "$PROXY_PORT" ]; then
            sudo apt-get install -y redsocks
            sudo systemctl stop redsocks
            cat > /tmp/redsocks.conf << EOF
          base {
            log_debug = off;
            log_info = on;
            log = "file:/tmp/redsocks.log";
            daemon = on;
            redirector = iptables;
          }
          redsocks {
            local_ip = 127.0.0.1;
            local_port = 12346;
            ip = $PROXY_HOST;
            port = $PROXY_PORT;
            type = socks5;
            login = "$PROXY_USER";
            password = "$PROXY_PASS";
          }
          EOF
            sudo redsocks -c /tmp/redsocks.conf
            sudo iptables -t nat -N REDSOCKS
            sudo iptables -t nat -A REDSOCKS -d 0.0.0.0/8 -j RETURN
            sudo iptables -t nat -A REDSOCKS -d 127.0.0.0/8 -j RETURN
            sudo iptables -t nat -A REDSOCKS -d 10.0.0.0/8 -j RETURN
            sudo iptables -t nat -A REDSOCKS -p tcp -j REDIRECT --to-ports 12346
            sudo iptables -t nat -A OUTPUT -p tcp -j REDSOCKS
            echo "代理已启动: $PROXY_HOST:$PROXY_PORT"
          else
            echo "未配置代理，直连"
          fi

      - name: Run Renew Script
        env:
          ACL_COOKIES: ${{ secrets.ACL_COOKIES }}
        run: python renew.py

      - name: Keep Repo Active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last run: $(date '+%Y-%m-%d %H:%M:%S')" > keep_alive.txt
          git add keep_alive.txt
          git diff --staged --quiet || git commit -m "chore: keep alive $(date '+%Y-%m-%d')"
          git push
